<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="site-logo__name">{{ site.data.profile.name | default: site.author.name }}</span>
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="{{ '/' | relative_url }}" class="site-nav__link{% if page.layout == 'home' %} site-nav__link--active{% endif %}">Profile</a>
      {% for section in site.data.sections %}
        <a href="{{ section.slug | relative_url }}/" class="site-nav__link{% if page.section_slug == section.slug %} site-nav__link--active{% endif %}">{{ section.name }}</a>
      {% endfor %}
    </nav>
    <button class="theme-toggle" type="button" aria-label="Switch to dark theme" data-theme-toggle>
      <svg class="theme-toggle__icon theme-toggle__icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="theme-toggle__icon theme-toggle__icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
