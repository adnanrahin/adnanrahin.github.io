{% assign sd_docs = site.system_design | sort: 'order' %}
<aside class="sd-sidebar" id="sd-sidebar">
  <div class="sd-sidebar__header">
    <a href="{{ '/system-design/' | relative_url }}" class="sd-sidebar__title">System Design</a>
    <button type="button" class="sd-sidebar__close" aria-label="Close topics" data-sd-sidebar-close>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <p class="sd-sidebar__hint">Topics appear here as you add them.</p>
  <ol class="sd-nav">
    {% for doc in sd_docs %}
      <li class="sd-nav__item{% if page.url == doc.url %} sd-nav__item--active{% endif %}">
        <a href="{{ doc.url | relative_url }}" class="sd-nav__link">
          <span class="sd-nav__num">{{ doc.order | default: forloop.index }}</span>
          <span class="sd-nav__text">
            <span class="sd-nav__label">{{ doc.title }}</span>
            {% if doc.description %}
            <span class="sd-nav__desc">{{ doc.description }}</span>
            {% endif %}
          </span>
        </a>
      </li>
    {% endfor %}
  </ol>
</aside>
