---
layout: default
---
<div class="docs-shell docs-shell--single">
  <div class="docs-stage">
    <article class="docs-article{% if page.sd_overview %} docs-article--overview{% endif %}">
      {% unless page.sd_hide_header %}
      <header class="docs-article__header">
        {% unless page.sd_overview %}
        <p class="docs-article__eyebrow">System Design</p>
        {% endunless %}
        <h1 class="docs-article__title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="docs-article__lead">{{ page.description }}</p>
        {% endif %}
      </header>
      {% endunless %}
      <div class="docs-content post-content">
        {{ content }}
      </div>
    </article>
  </div>
</div>
