---
layout: default
---
<div class="docs-shell">
  <aside class="docs-rail" id="docs-rail" aria-label="System Design">
    <div class="docs-rail__top">
      <a href="{{ '/' | relative_url }}" class="docs-rail__home">← Profile</a>
      <a href="{{ '/system-design/' | relative_url }}" class="docs-rail__brand">
        <span class="docs-rail__brand-icon" aria-hidden="true">◈</span>
        <span class="docs-rail__brand-text">System Design</span>
      </a>
      <button type="button" class="docs-rail__close" aria-label="Close navigation" data-docs-close>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    {% include system-design-nav.html %}
  </aside>

  <div class="docs-backdrop" data-docs-close aria-hidden="true"></div>

  <div class="docs-stage">
    <div class="docs-stage__toolbar">
      <button type="button" class="docs-menu-btn" aria-expanded="false" aria-controls="docs-rail" data-docs-toggle>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        <span>Topics</span>
      </button>
    </div>

    <article class="docs-article{% if page.sd_overview %} docs-article--overview{% endif %}">
      {% unless page.sd_hide_header %}
      <header class="docs-article__header">
        {% unless page.sd_overview %}
        <p class="docs-article__eyebrow">System Design</p>
        {% endunless %}
        <h1 class="docs-article__title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="docs-article__lead">{{ page.description }}</p>
        {% endif %}
      </header>
      {% endunless %}
      <div class="docs-content post-content">
        {{ content }}
      </div>
    </article>
  </div>
</div>
