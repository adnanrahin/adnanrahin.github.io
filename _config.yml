title: Adnan Habib Rahin
description: Senior Software Engineer — AWS, Cloud Infrastructure, Data Platforms
url: https://adnanrahin.github.io
baseurl: ""

author:
  name: Adnan Habib Rahin
  email: adnan.rahin@outlook.com
  github: adnanrahin
  linkedin: adnanrahin
  leetcode: iron_hide

theme: null

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  aws:
    output: true
    permalink: /aws/:name/
    order: 1
  system_design:
    output: true
    permalink: /system-design/:name/
    order: 2

defaults:
  - scope:
      path: ""
      type: aws
    values:
      layout: post
      category: Blog
  - scope:
      path: ""
      type: system_design
    values:
      layout: system-design
      category: System Design
      section_slug: system-design

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor
