title: Adnan Habib Rahin
description: Senior Software Engineer — AWS, Cloud Infrastructure, Data Platforms
url: https://adnanrahin.github.io
baseurl: ""

author:
  name: Adnan Habib Rahin
  email: adnan.rahin@outlook.com
  github: adnanrahin
  linkedin: adnanrahin
  leetcode: iron_hide

theme: null

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  aws:
    output: true
    permalink: /aws/:name/
    order: 1

defaults:
  - scope:
      path: ""
      type: aws
    values:
      layout: post
      category: AWS

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - docker-compose.yml
  - serve.ps1
  - serve.sh
  - vendor
